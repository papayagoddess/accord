<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>äccord</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#121212"> <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@1,400;1,700&family=Inter:wght@300;500&display=swap');

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --vogue-black: #121212;
            --vogue-gray: #a1a1a1;
            --vogue-white: #ffffff;
        }

        body {
            background: #fdfdfd;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .vogue-card {
            width: 340px;
            background: transparent;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .vogue-artwork {
            width: 260px;
            height: 260px;
            margin-bottom: 35px;
            overflow: hidden;
            background: #f4f4f4;
        }

        .vogue-artwork img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
        }

        .vogue-title-mask {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        .vogue-title {
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 2.2rem;
            margin: 0;
            display: inline-block;
            padding-left: 100%;
            animation: vogue-marquee 25s linear infinite;
            color: var(--vogue-black);
        }

        @keyframes vogue-marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .vogue-timestamp {
            font-size: 0.55rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--vogue-gray);
            margin-top: 15px;
        }

        .vogue-visualizer {
            display: flex;
            gap: 14px;
            height: 35px;
            margin: 35px 0;
            align-items: flex-end;
        }

        .bar {
            width: 1.2px;
            height: 5px;
            background: var(--vogue-black);
        }

        @keyframes vogue-bounce {
            0%, 100% { height: 5px; }
            50% { height: 35px; }
        }

        .is-playing .bar { animation: vogue-bounce 0.8s infinite ease-in-out; }
        .is-playing .bar:nth-child(2) { animation-delay: 0.2s; }
        .is-playing .bar:nth-child(3) { animation-delay: 0.4s; }

        .vogue-controls { display: flex; gap: 8px; margin-bottom: 30px; }

        .control-btn {
            background: none;
            border: none;
            font-size: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--vogue-black);
            padding: 10px;
        }

        .vogue-progress-container {
            width: 85%;
            height: 40px;
            display: flex;
            align-items: center;
            cursor: pointer;
            position: relative;
        }

        .vogue-progress-bg {
            width: 100%;
            height: 3px;
            background: #eeeeee;
            position: relative;
            pointer-events: none;
        }

        .vogue-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--vogue-black);
            position: absolute;
            left: 0;
            top: 0;
            transition: width 0.1s linear;
        }

        .vogue-progress-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: -4px;
            width: 11px;
            height: 11px;
            background: var(--vogue-black);
            border-radius: 50%;
        }

        .chaos-toggle {
            margin-top: 30px;
            background: none;
            border: none;
            font-family: 'Bodoni Moda', serif;
            font-style: italic;
            font-size: 0.7rem;
            color: var(--vogue-gray);
            cursor: pointer;
        }

        @keyframes rainbow-flow {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 100%; }
        }

        .chaos-on .bar {
            background: linear-gradient(to bottom, #ff0000, #ffff00, #00ff00, #0000ff, #9400d3, #ff0000);
            background-size: 100% 400%;
        }

        .is-playing.chaos-on .bar { 
            animation: vogue-bounce 0.8s infinite ease-in-out, rainbow-flow 3s linear infinite; 
        }

        .chaos-on .vogue-progress-fill,
        .chaos-on .vogue-progress-fill::after {
            background: linear-gradient(to right, #ff0000, #00ff00, #0000ff);
        }
    </style>
</head>
<body>

    <div class="vogue-card">
        <div class="vogue-artwork">
            <img src="title.png" alt="Artwork" id="albumArt" onerror="this.src='https://via.placeholder.com/400'">
        </div>

        <div class="vogue-title-mask">
            <h1 class="vogue-title" id="titleText">äccord</h1>
        </div>

        <p class="vogue-timestamp" id="timeText">0:00 — 0:00</p>

        <div class="vogue-visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="vogue-controls">
            <input type="file" id="fileInput" webkitdirectory directory multiple style="display:none;">
            <button id="browseBtn" class="control-btn">BROWSE</button>
            <button id="prevBtn" class="control-btn">PREV</button>
            <button id="playBtn" class="control-btn">PLAY</button>
            <button id="nextBtn" class="control-btn">NEXT</button>
        </div>

        <div class="vogue-progress-container" id="progressContainer">
            <div class="vogue-progress-bg">
                <div id="progressBar" class="vogue-progress-fill"></div>
            </div>
        </div>

        <button id="chaosTrigger" class="chaos-toggle">chaos: off</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const audio = new Audio();
            const playBtn = document.getElementById('playBtn');
            const browseBtn = document.getElementById('browseBtn');
            const fileInput = document.getElementById('fileInput');
            const visualizer = document.getElementById('visualizer');
            const progressBar = document.getElementById('progressBar');
            const progressContainer = document.getElementById('progressContainer');
            const timeText = document.getElementById('timeText');
            const titleText = document.getElementById('titleText');
            const chaosBtn = document.getElementById('chaosTrigger');

            let playlist = [];
            let currentIndex = 0;

            browseBtn.onclick = () => fileInput.click();

            fileInput.onchange = function(e) {
                const files = Array.from(e.target.files);
                playlist = files.filter(f => f.type.startsWith('audio/') || f.name.match(/\.(mp3|wav|ogg|m4a)$/i));
                if (playlist.length > 0) {
                    currentIndex = 0;
                    loadTrack(0);
                }
            };

            function loadTrack(index) {
                if (playlist.length === 0) return;
                currentIndex = (index + playlist.length) % playlist.length;
                const file = playlist[currentIndex];
                const songTitle = file.name.replace(/\.[^/.]+$/, "").toLowerCase();
                
                audio.pause();
                if (audio.src) URL.revokeObjectURL(audio.src);
                audio.src = URL.createObjectURL(file);
                titleText.textContent = songTitle;

                // ANDROID SYSTEM MEDIA CONTROL
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: songTitle,
                        artist: 'äccord',
                        artwork: [{ src: 'title.png', sizes: '512x512', type: 'image/png' }]
                    });
                    navigator.mediaSession.setActionHandler('play', () => audio.play());
                    navigator.mediaSession.setActionHandler('pause', () => audio.pause());
                    navigator.mediaSession.setActionHandler('previoustrack', () => loadTrack(currentIndex - 1));
                    navigator.mediaSession.setActionHandler('nexttrack', () => loadTrack(currentIndex + 1));
                }

                audio.play().then(() => {
                    playBtn.textContent = "PAUSE";
                    visualizer.classList.add('is-playing');
                }).catch(() => {
                    playBtn.textContent = "PLAY";
                    visualizer.classList.remove('is-playing');
                });
            }

            playBtn.onclick = () => {
                if (!audio.src) return;
                if (audio.paused) {
                    audio.play();
                    playBtn.textContent = "PAUSE";
                    visualizer.classList.add('is-playing');
                } else {
                    audio.pause();
                    playBtn.textContent = "PLAY";
                    visualizer.classList.remove('is-playing');
                }
            };

            document.getElementById('nextBtn').onclick = (e) => {
                e.preventDefault();
                loadTrack(currentIndex + 1);
            };

            document.getElementById('prevBtn').onclick = (e) => {
                e.preventDefault();
                loadTrack(currentIndex - 1);
            };

            progressContainer.addEventListener('click', (e) => {
                if (!audio.duration) return;
                const rect = progressContainer.getBoundingClientRect();
                const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                audio.currentTime = pct * audio.duration;
            });

            audio.ontimeupdate = () => {
                if (!isNaN(audio.duration)) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressBar.style.width = percent + "%";
                    const cur = Math.floor(audio.currentTime / 60) + ":" + Math.floor(audio.currentTime % 60).toString().padStart(2, '0');
                    const dur = Math.floor(audio.duration / 60) + ":" + Math.floor(audio.duration % 60).toString().padStart(2, '0');
                    timeText.textContent = `${cur} — ${dur}`;
                }
            };

            audio.onended = () => loadTrack(currentIndex + 1);

            chaosBtn.onclick = () => {
                document.querySelector('.vogue-card').classList.toggle('chaos-on');
                chaosBtn.textContent = document.querySelector('.vogue-card').classList.contains('chaos-on') ? "chaos: on" : "chaos: off";
            };

            if('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').then(reg => reg.update());
            }
        });
    </script>
</body>
</html>
